<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Font Icon Remapper</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-left">
        <span id="headerLogo" class="header-logo"></span>
        <h1 class="header-title" id="headerTitle">Font Icon Remapper</h1>
      </div>
      <div class="header-actions">
        <button id="btnNewProject" class="btn btn-ghost">New Project</button>
        <button id="btnLoad" class="btn btn-secondary">Load Project</button>
        <button id="btnExport" class="btn btn-secondary" data-requires-font="true">Export</button>
        <button id="btnGenerate" class="btn btn-purple" data-requires-font="true">Generate Font</button>
      </div>
    </header>
    <div class="main" id="mainArea"></div>
    <footer class="app-footer" id="appFooter"></footer>
  </div>

  <input type="file" id="projectFileInput" accept=".json" hidden>

  <div id="toast" class="toast"></div>

  <div id="ctxMenu" class="ctx-menu" hidden>
    <!-- context menu items injected dynamically -->
  </div>

  <!-- modal overlay is created dynamically by edit-modal.js -->

  <script src="js/vendor/opentype.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
